spring:
  r2dbc:
    url: r2dbc:h2:mem:///customer-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  datasource:
    url: jdbc:h2:mem:customer-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration,classpath:db/testdata
  data:
    redis:
      host: localhost
      port: 6379
management:
  health:
    redis:
      enabled: false
