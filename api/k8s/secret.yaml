apiVersion: v1
kind: Secret
metadata:
  name: customer-service-secret
  namespace: customer-service
  labels:
    app.kubernetes.io/name: customer-service
type: Opaque
data:
  # Reemplazar con valores reales en base64 antes de desplegar:
  #   echo -n 'mi_usuario' | base64
  #   echo -n 'mi_contraseña_segura' | base64
  DB_USER: REPLACE_ME_BASE64
  DB_PASSWORD: REPLACE_ME_BASE64
