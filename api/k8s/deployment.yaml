apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: customer-service
  labels:
    app.kubernetes.io/name: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
      labels:
        app.kubernetes.io/name: customer-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: customer-service
          # Tag is updated automatically by the docker-api CI job after each push to main.
          # For manual deploys use: kubectl set image deployment/customer-service customer-service=ghcr.io/apchavez/spring-angular-fullstack-k8s-api:sha-840a388
          image: ghcr.io/apchavez/spring-angular-fullstack-k8s-api:sha-840a388
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: customer-service-config
            - secretRef:
                name: customer-service-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 10
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp-dir
          emptyDir: {}
