# Usage: kubectl apply -k api/k8s/overlays/prod
# Set IMAGE_TAG to the sha-* tag from CI before applying:
#   kustomize edit set image ghcr.io/apchavez/spring-angular-fullstack-k8s-api:sha-<SHA>
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Replace sha-XXXXXXX with the actual commit SHA tag from the docker-api CI job
images:
  - name: ghcr.io/apchavez/spring-angular-fullstack-k8s-api
    newTag: sha-XXXXXXX

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: customer-service
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
    target:
      kind: Deployment
      name: customer-service
