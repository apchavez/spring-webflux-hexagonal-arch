apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: customer-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "customer-service.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "customer-service.selectorLabels" . | nindent 6 }}
